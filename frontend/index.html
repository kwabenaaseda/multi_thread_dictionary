<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lexicon — Professional Dictionary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-pattern"></div>
  </div>

  <div class="app-container">
   <header class="site-header">
  <div class="nav-content">
    <div class="brand">
      <span class="brand-logo">L</span>
      <span class="brand-name">Lexicon</span>
    </div>
    <div class="nav-controls" style="display: flex; align-items: center; gap: 15px;">
      <div class="status-pill" style="display: flex; align-items: center; gap: 6px;">
        <span class="dot" id="server-dot"></span>
        <span id="server-status" class="status-text" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;">Connecting</span>
      </div>
      <button class="icon-btn" id="themeToggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">
        <span id="toggleIcon">☀</span>
      </button>
    </div>
  </div>
</header>

    <main class="main-layout">
      <section class="search-section">
        <div class="search-container">
  <select id="langSelect" class="lang-selector">
    <option value="en" selected>EN</option>
    <option value="fr">FR</option>
    <option value="es">ES</option>
    <option value="hi">HI</option>
  </select>
  <input type="text" id="wordInput" placeholder="Search for a concept...">
  <button id="searchbtn" class="search-btn">Search</button>
</div>
        
        <div id="result" class="result-display">
          <div class="empty-state">
            <p>Enter a word to explore its etymology and meaning.</p>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="sidebar-block">
          <h3>Recent History</h3>
          <ul id="historyList" class="history-list">
            </ul>
          <button id="clearHistory" class="text-btn">Clear History</button>
        </div>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-meta">
          <span>Distributed Systems</span>
          <span class="sep">•</span>
          <span>UENR 2026</span>
        </div>
        <div class="footer-tech">
          <code>TCP:5000 / HTTP:5001</code>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
